<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="Inter, Arial, sans-serif" font-size="13">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #1d1031; }
    .sub { font-size: 12px; fill: #4c4468; }
    .box { fill: #ffffff; stroke: #7c3aed; stroke-width: 1.5; rx: 10; ry: 10; }
    .err { fill: #fde8e8; stroke: #dc2626; stroke-width: 1.5; }
    .ok { fill: #e8f7ef; stroke: #10b981; stroke-width: 1.5; }
    .mock { fill: #f7f7fb; stroke: #5b21b6; stroke-width: 1.5; }
    .label { fill: #1d1031; font-weight: 600; }
    .arrow { stroke: #5b21b6; stroke-width: 1.6; fill: none; marker-end: url(#arr); }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#5b21b6"/>
    </marker>
  </defs>
  <text x="30" y="40" class="title">User Story 4 — As a coach, I want to open an athlete profile and see their upcoming training sessions so that I can plan follow-ups.</text>

  <g>
    <rect class="box" x="30" y="80" width="230" height="70"/>
    <text class="label" x="50" y="110">1. Athletes list</text>
    <text class="sub" x="50" y="130">GET /people/athletes</text>

    <rect class="box" x="290" y="80" width="230" height="70"/>
    <text class="label" x="310" y="110">2. Click "View profile"</text>
    <text class="sub" x="310" y="130">Navigate /athletes/:publicId</text>

    <rect class="box" x="550" y="80" width="260" height="70"/>
    <text class="label" x="570" y="110">3. Detail page mounts</text>
    <text class="sub" x="570" y="130">Parallel GETs: athlete + trainings</text>

    <rect class="err" x="840" y="80" width="230" height="70" rx="10" ry="10"/>
    <text class="label" x="860" y="110">Fork · Not found</text>
    <text class="sub" x="860" y="130">"Athlete not found"</text>

    <rect class="ok" x="30" y="200" width="300" height="70" rx="10" ry="10"/>
    <text class="label" x="50" y="230">4. Profile + address rendered</text>
    <text class="sub" x="50" y="250">Height, weight, contact, address</text>

    <rect class="box" x="360" y="200" width="300" height="70"/>
    <text class="label" x="380" y="230">5. Upcoming trainings filtered</text>
    <text class="sub" x="380" y="250">Client-side date &gt;= now, sorted</text>

    <rect class="box" x="690" y="200" width="300" height="70"/>
    <text class="label" x="710" y="230">6. Empty fallback</text>
    <text class="sub" x="710" y="250">"No upcoming training sessions"</text>

    <path class="arrow" d="M260 115 L290 115"/>
    <path class="arrow" d="M520 115 L550 115"/>
    <path class="arrow" d="M810 115 L840 115"/>
    <path class="arrow" d="M680 150 L180 200"/>
    <path class="arrow" d="M680 150 L510 200"/>
    <path class="arrow" d="M680 150 L840 200"/>
  </g>

  <text x="30" y="330" class="title">Mock-up · low-fidelity wireframe</text>
  <g transform="translate(30,350)">
    <rect class="mock" x="0" y="0" width="1040" height="380" rx="12" ry="12"/>
    <rect x="20" y="20" width="1000" height="36" fill="#5b21b6"/>
    <text x="40" y="44" fill="#fff" font-weight="700">Athlete profile</text>

    <rect x="40" y="80" width="960" height="130" fill="#fff" stroke="#7c3aed"/>
    <text x="55" y="105" class="label">Jane Doe · Jersey #10</text>
    <text x="55" y="128" class="sub">Email · Phone · Date of birth</text>
    <text x="55" y="148" class="sub">Height · Weight · Address (from API)</text>

    <rect x="40" y="230" width="960" height="130" fill="#fff" stroke="#7c3aed"/>
    <text x="55" y="255" class="label">Upcoming training sessions</text>
    <rect x="55" y="270" width="920" height="24" fill="#f7f7fb" stroke="#7c3aed"/>
    <text x="70" y="287" class="sub">Morning drills · 2026-05-02 08:00 · Focus: passing</text>
    <rect x="55" y="300" width="920" height="24" fill="#f7f7fb" stroke="#7c3aed"/>
    <text x="70" y="317" class="sub">Strength · 2026-05-04 17:00 · Focus: core</text>
  </g>
</svg>
