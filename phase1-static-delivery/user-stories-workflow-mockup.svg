<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <rect width="1400" height="980" fill="#f8f7ff"/>
  <text x="40" y="55" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#4f2ac9">
    Athletics Sports Club · User stories + workflow + mock-up (single file)
  </text>

  <rect x="40" y="90" width="1320" height="380" rx="14" fill="#ffffff" stroke="#d9d4f8"/>
  <text x="60" y="130" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#2b1d67">
    User Story 1: As a prospective athlete, I want to reserve a tryout slot so that I can start the selection process.
  </text>

  <rect x="70" y="170" width="230" height="70" rx="10" fill="#eef1ff" stroke="#8aa0ff"/>
  <text x="85" y="200" font-family="Inter, Arial, sans-serif" font-size="14" fill="#172554">Open Tryout Booking</text>
  <text x="85" y="220" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Start workflow</text>

  <rect x="360" y="170" width="250" height="70" rx="10" fill="#eef1ff" stroke="#8aa0ff"/>
  <text x="375" y="200" font-family="Inter, Arial, sans-serif" font-size="14" fill="#172554">Select athlete + session</text>
  <text x="375" y="220" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Form step</text>

  <rect x="670" y="170" width="260" height="70" rx="10" fill="#eef1ff" stroke="#8aa0ff"/>
  <text x="685" y="200" font-family="Inter, Arial, sans-serif" font-size="14" fill="#172554">Validation checks</text>
  <text x="685" y="220" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Required fields / medical / slots</text>

  <rect x="990" y="170" width="330" height="70" rx="10" fill="#e8fff0" stroke="#4ade80"/>
  <text x="1005" y="200" font-family="Inter, Arial, sans-serif" font-size="14" fill="#14532d">Success ending: booking confirmed</text>
  <text x="1005" y="220" font-family="Inter, Arial, sans-serif" font-size="12" fill="#166534">Slots decrease and request is saved locally</text>

  <line x1="300" y1="205" x2="360" y2="205" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="610" y1="205" x2="670" y2="205" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="930" y1="205" x2="990" y2="205" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="670" y="270" width="280" height="72" rx="10" fill="#fff1f2" stroke="#fb7185"/>
  <text x="685" y="300" font-family="Inter, Arial, sans-serif" font-size="13" fill="#881337">Error message:</text>
  <text x="685" y="320" font-family="Inter, Arial, sans-serif" font-size="12" fill="#9f1239">"Please select an athlete and a tryout session."</text>

  <rect x="980" y="270" width="340" height="72" rx="10" fill="#fff7ed" stroke="#fb923c"/>
  <text x="995" y="300" font-family="Inter, Arial, sans-serif" font-size="13" fill="#9a3412">Alternative ending:</text>
  <text x="995" y="320" font-family="Inter, Arial, sans-serif" font-size="12" fill="#7c2d12">Choose another session when selected one is full</text>

  <line x1="800" y1="240" x2="800" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="930" y1="306" x2="980" y2="306" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="70" y="270" width="230" height="72" rx="10" fill="#fefce8" stroke="#facc15"/>
  <text x="85" y="300" font-family="Inter, Arial, sans-serif" font-size="13" fill="#713f12">Cancellation path</text>
  <text x="85" y="320" font-family="Inter, Arial, sans-serif" font-size="12" fill="#854d0e">"Booking canceled" and form resets</text>
  <line x1="480" y1="240" x2="185" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="40" y="510" width="1320" height="420" rx="14" fill="#ffffff" stroke="#d9d4f8"/>
  <text x="60" y="550" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#2b1d67">
    User Story 2: As a coach, I want to review athlete profiles and create a shortlist so that I can prepare evaluations.
  </text>

  <rect x="70" y="590" width="250" height="72" rx="10" fill="#eef1ff" stroke="#8aa0ff"/>
  <text x="85" y="620" font-family="Inter, Arial, sans-serif" font-size="14" fill="#172554">Open Athlete Dashboard</text>
  <text x="85" y="640" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Home view</text>

  <rect x="370" y="590" width="270" height="72" rx="10" fill="#eef1ff" stroke="#8aa0ff"/>
  <text x="385" y="620" font-family="Inter, Arial, sans-serif" font-size="14" fill="#172554">Filter by event / search name</text>
  <text x="385" y="640" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Fork: no matches possible</text>

  <rect x="690" y="590" width="260" height="72" rx="10" fill="#eef1ff" stroke="#8aa0ff"/>
  <text x="705" y="620" font-family="Inter, Arial, sans-serif" font-size="14" fill="#172554">Review athlete cards</text>
  <text x="705" y="640" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Status + medical clearance</text>

  <rect x="1000" y="590" width="320" height="72" rx="10" fill="#e8fff0" stroke="#4ade80"/>
  <text x="1015" y="620" font-family="Inter, Arial, sans-serif" font-size="14" fill="#14532d">Success ending: shortlist created</text>
  <text x="1015" y="640" font-family="Inter, Arial, sans-serif" font-size="12" fill="#166534">Selected candidates visible in summary</text>

  <line x1="320" y1="626" x2="370" y2="626" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="640" y1="626" x2="690" y2="626" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="950" y1="626" x2="1000" y2="626" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="370" y="700" width="270" height="72" rx="10" fill="#fff1f2" stroke="#fb7185"/>
  <text x="385" y="730" font-family="Inter, Arial, sans-serif" font-size="13" fill="#881337">Alternative ending:</text>
  <text x="385" y="750" font-family="Inter, Arial, sans-serif" font-size="12" fill="#9f1239">No athletes match filters → update criteria</text>

  <line x1="505" y1="662" x2="505" y2="700" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
  </defs>
</svg>
